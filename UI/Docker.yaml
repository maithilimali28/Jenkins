version: '3.8'

services:

  # ── Node.js Backend API ────────────────────────────────
  backend:
    build: ./backend
    container_name: todo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    networks:
      - app-network

  # ── React Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:5000
        - REACT_APP_BUILD_NUMBER=${BUILD_NUMBER:-1}
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge